<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>PineCone Cabin Rentals</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <div class="logo">
        <img src="images/Logo.png" alt="Logo" />
      </div>
      <nav>
        <a href="index.html">Home</a>
        <a href="cabins.html">Cabins</a>
        <a href="booking.html">Booking</a>
        <a href="amenities.html">Amenities</a>
        <a href="gallery.html">Gallery</a>
      </nav>
    </header>

    <div class="hero fade-in">
      <div class="hero-content">
        <h1>Gallery</h1>
      </div>
    </div>

    <div class="container fade-in">
      <div class="gallery-grid">
        <img
          class="gallery-img"
          src="images/Cedar Hollow.jpg"
          alt="Cedar Hollow"
        />
        <img
          class="gallery-img"
          src="images/Eagle's Nest.jpg"
          alt="Eagle's Nest"
        />
        <img
          class="gallery-img"
          src="images/Maple Creek.jpg"
          alt="Maple Creek"
        />
        <img
          class="gallery-img"
          src="images/Mountain Cabin.JPEG"
          alt="Mountain Cabin"
        />
        <img class="gallery-img" src="images/Hot Tub.jpg" alt="Hot Tub" />
        <img class="gallery-img" src="images/Kitchen.jpg" alt="Kitchen" />
        <img class="gallery-img" src="images/Fireplace.png" alt="Fireplace" />
        <img class="gallery-img" src="images/TV.jpg" alt="TV" />
      </div>
    </div>

    <!-- LIGHTBOX -->
    <div id="lightbox">
      <span id="lightbox-close">&times;</span>
      <img id="lightbox-img" />
    </div>

    <footer>
      <p>
        Contact: info@pineconecabins.com | (555) 123-4567 | Mountain View, CO
      </p>
    </footer>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
