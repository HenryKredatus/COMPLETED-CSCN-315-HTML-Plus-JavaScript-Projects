<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Membership</title>
    <link rel="stylesheet" href="style.css" />
    <script defer src="script.js"></script>
  </head>
  <body>
    <header>
      <div class="logo">
        <img src="images/Logo.png" alt="Logo" />
      </div>
      <nav>
        <a href="index.html">Home</a>
        <a href="classes.html">Classes</a>
        <a href="membership.html">Membership</a>
        <a href="trainers.html">Trainers</a>
        <a href="success.html">Success Stories</a>
      </nav>
    </header>

    <!-- PRICING CALCULATOR -->
    <div class="calculator">
      <h2>Build Your Membership</h2>

      <label>
        Choose Plan:
        <select id="planSelect">
          <option value="20">Basic - $20</option>
          <option value="50">Premium - $50</option>
        </select>
      </label>

      <label>
        <input type="checkbox" class="addon" value="10" />
        Personal Training (+$10)
      </label>

      <label>
        <input type="checkbox" class="addon" value="5" />
        Nutrition Guide (+$5)
      </label>

      <label>
        <input type="checkbox" class="addon" value="8" />
        Access to Classes (+$8)
      </label>

      <div class="total">Total: $<span id="total">20</span>/month</div>

      <button id="submitMembership">Confirm Membership</button>
      <p id="confirmationMessage" class="confirmation hidden"></p>
    </div>

    <footer>
      <p>Galaxy Fitness Center</p>
      <p>Email: contact@galaxyfitness.com | Phone: (555) 123-4567</p>
      <p>123 Cosmic Way, Orbit City</p>
    </footer>
  </body>
</html>
