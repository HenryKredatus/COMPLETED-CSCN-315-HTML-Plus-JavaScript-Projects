<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>SilverFork Bistro</title>
    <link rel="stylesheet" href="style.css" />

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  </head>

  <body>
    <div class="navbar">
      <div class="logo">
        <img src="images/Logo.png" alt="SilverFork Bistro logo" />
      </div>

      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="menu.html">Menu</a>
        <a href="reservations.html">Reservations</a>
        <a href="chefs.html">Chefs</a>
        <a href="events.html">Events</a>
      </div>
    </div>

    <div class="section">
      <h2 class="section-title">Reservations</h2>

      <form id="reservation-form" novalidate>
        <!-- NAME -->
        <div class="field">
          <input type="text" id="name" placeholder="Name" />
          <span class="icon"></span>
          <small class="msg"></small>
        </div>

        <!-- DATE (CUSTOM CALENDAR) -->
        <div class="field calendar-wrapper">
          <input
            type="text"
            id="date-display"
            placeholder="Select Date"
            readonly
          />
          <span class="icon"></span>
          <small class="msg"></small>

          <div class="calendar-popup" id="calendar-popup">
            <div class="calendar-header">
              <button type="button" id="prev-month">‹</button>
              <div id="month-label"></div>
              <button type="button" id="next-month">›</button>
            </div>

            <div class="calendar-grid" id="calendar-grid"></div>
          </div>

          <input type="hidden" id="date" />
        </div>

        <!-- TIME (CUSTOM PICKER) -->
        <div class="field time-wrapper">
          <input
            type="text"
            id="time-display"
            placeholder="Select Time"
            readonly
          />
          <span class="icon"></span>
          <small class="msg"></small>

          <div class="time-popup" id="time-popup">
            <div class="time-grid" id="time-grid"></div>
          </div>

          <input type="hidden" id="time" />
        </div>

        <!-- PARTY -->
        <div class="field">
          <select id="party">
            <option value="">Party Size</option>
            <option>1</option>
            <option>2</option>
            <option>3</option>
            <option>4</option>
            <option>5</option>
            <option>6</option>
            <option>7</option>
            <option>8+</option>
          </select>
          <span class="icon"></span>
          <small class="msg"></small>
        </div>

        <button class="btn" type="submit">Reserve Table</button>
        <div id="success-message"></div>
      </form>
    </div>

    <footer>
      <p>SilverFork Bistro | 123 Culinary Ave, Food City</p>
      <p>Email: contact@silverfork.com | Phone: (555) 123-4567</p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
