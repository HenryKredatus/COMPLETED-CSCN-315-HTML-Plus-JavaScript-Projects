<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Todo App</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        font-family: Arial, sans-serif;
        min-height: 100vh;
        background: linear-gradient(135deg, #74ebd5, #acb6e5);
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .app {
        width: 100%;
        max-width: 500px;
        background: white;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
      }

      h1 {
        text-align: center;
        margin-bottom: 15px;
      }

      .input-row {
        display: flex;
        gap: 8px;
        margin-bottom: 10px;
      }

      .input-row input {
        flex: 1;
        padding: 10px;
        font-size: 16px;
      }

      .input-row button {
        padding: 10px 14px;
        font-size: 16px;
        cursor: pointer;
        background: #4caf50;
        color: white;
        border: none;
        border-radius: 4px;
      }

      ul {
        list-style: none;
        padding: 0;
        margin: 0;
      }

      li {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px;
        border-bottom: 1px solid #ddd;
      }

      li.completed span {
        text-decoration: line-through;
        color: gray;
      }

      li span {
        flex: 1;
      }

      button.small {
        padding: 4px 8px;
        font-size: 14px;
      }

      .filters {
        text-align: center;
        margin-top: 12px;
      }

      .filters button {
        margin: 0 4px;
      }

      .ai-note {
        margin-top: 20px;
        font-size: 0.9em;
        background: #f0f0f0;
        padding: 10px;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <h1>Todo App</h1>

      <div class="input-row">
        <input type="text" id="todoInput" placeholder="Add a new todo..." />
        <button onclick="addTodo()">Add</button>
      </div>

      <ul id="todoList"></ul>

      <div class="filters">
        <button onclick="setFilter('all')">All</button>
        <button onclick="setFilter('active')">Active</button>
        <button onclick="setFilter('completed')">Completed</button>
      </div>

      <div class="ai-note">
        <strong>AI Usage Note</strong><br /><br />
        AI was used to suggest UI improvements, component structure, function
        naming, and to identify edge cases such as empty input, long text, and
        edit confirmation behavior.
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
